name: E2E Tests (Internal)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to run the workflow on'
        required: true
        default: 'main'  # Default to 'main' branch

env:
  java_version: "17"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}

    environment:
      name: Autotests
      url: https://concordium.testmo.net/automation/runs/2

    strategy:
      fail-fast: false
      matrix:
        api-level: [ 31 ]
        profile: [ pixel_7_pro ]
        target: [ google_apis ]       # ✅ CHANGE 1: added target to matrix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Slack Post
        uses: devtk0582/slack-post-action@v1.2
        with:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          MESSAGE: "📱 Test Started on device set :${{ matrix.profile }} You can find results and logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Slack Post
        uses: devtk0582/slack-post-action@v1.2
        with:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          MESSAGE: 🚀 Starting Stagenet Debug Build

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "${{ env.java_version }}"
          distribution: corretto

      - name: Build preview
        run: ./gradlew app:assemblePreviewDebug --stacktrace

      - name: Log APK Path
        id: log_apk
        run: |
          echo "Listing APK files..."
          APK_PATH=$(find app/build/outputs/apk -type f -name "*.apk")
          echo "APK_PATH=$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Slack Post
        uses: devtk0582/slack-post-action@v1.2
        with:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          MESSAGE: 📱 Test Started on device set :${{ matrix.profile }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Install Appium Dependencies
        run: npm install -g appium

      - name: Install uiautomator2
        run: appium driver install uiautomator2

      - name: Download ChromeDriver 146 for Linux CI
        run: |
          curl -L -o /tmp/cd.zip \
            "https://storage.googleapis.com/chrome-for-testing-public/146.0.7680.165/linux64/chromedriver-linux64.zip"
          unzip /tmp/cd.zip -d /tmp/cd
          mkdir -p ${{ github.workspace }}/drivers     
          cp /tmp/cd/chromedriver-linux64/chromedriver ${{ github.workspace }}/drivers/chromedriver_linux
          chmod +x ${{ github.workspace }}/drivers/chromedriver_linux
          echo "ChromeDriver version: $(${{ github.workspace }}/drivers/chromedriver_linux --version)"

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          CHROMEDRIVER_PATH: "${{ github.workspace }}/drivers/chromedriver_linux"
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: appium --port 4723 --allow-insecure adb_shell --log-level debug > /tmp/appium.log 2>&1 & APPIUM_READY=false; for i in $(seq 1 30); do RESPONSE=$(curl -s http://127.0.0.1:4723/status 2>/dev/null); if echo "$RESPONSE" | grep -q '"ready":true'; then echo "Appium is ready!"; APPIUM_READY=true; break; fi; echo "Attempt $i/30 - waiting..."; sleep 3; done; if [ "$APPIUM_READY" = "false" ]; then echo "Appium failed! Log:"; cat /tmp/appium.log; exit 1; fi && adb devices && adb -s emulator-5554 shell 'settings delete global hidden_api_policy_pre_p_apps; settings delete global hidden_api_policy_p_apps; settings delete global hidden_api_policy' && sleep 10 && (adb uninstall com.pioneeringtechventures.wallet.testnet || true) && adb install "$APK_PATH" && adb shell 'echo "chrome --disable-fre --no-default-browser-check --no-first-run" > /data/local/tmp/chrome-command-line' && adb shell am start -a android.intent.action.VIEW -d "https://wallet-test-bench.testnet.concordium.com/" com.android.chrome && sleep 8 && adb shell input keyevent 4 && sleep 2 && cd cryptox-android-autotests && mvn clean install

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: /tmp/appium.log

      - name: Submit TestNG results to Testmo
        if: always()
        working-directory: cryptox-android-autotests
        run: |
          npx @testmo/testmo-cli automation:run:submit \
            --instance "${TESTMO_PROJECT_URL}" \
            --project-id "${TESTMO_PROJECT_ID}" \
            --name "CryptoX Android E2E (internal)" \
            --source "cryptox-android-autotests" \
            --results "target/surefire-reports/**/*.xml"
        env:
          TESTMO_PROJECT_URL: ${{ secrets.TESTMO_PROJECT_URL }}
          TESTMO_TOKEN: ${{ secrets.TESTMO_API_TOKEN }}
          TESTMO_PROJECT_ID: ${{ secrets.TESTMO_PROJECT_ID }}

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-screenshots
          path: cryptox-android-autotests/screenshots/